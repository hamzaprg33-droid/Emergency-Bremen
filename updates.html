<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updates | Emergency Bremen</title>
    <link rel="stylesheet" href="updates_style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <div id="loader-wrapper">
        <div class="loader-content">
            <p>Loading Assets...</p>
            <div class="spinner"></div>
        </div>
    </div>

    <div class="container">
        <header>
            <a href="index.html" class="back-btn">← BACK</a>
            <h1>MISSION <span>LOGS</span></h1>
        </header>

        <section class="update-list">
            <div class="update-card">
                <div class="date">MARCH 2024</div>
                <h2>v1.2 - The Bremen Central Update</h2>
                <p>Added new police cruisers, revamped the main station, and improved siren acoustics.</p>
            </div>
        </section>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader-wrapper');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 3000); 
        });
    </script>
</body>
</html>
